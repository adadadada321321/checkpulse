<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0b0e14"/>
    </radialGradient>
    <radialGradient id="amber-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Ambient amber glow -->
  <ellipse cx="600" cy="280" rx="500" ry="300" fill="url(#amber-glow)" filter="url(#blur-glow)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Logo mark (amber square) -->
  <rect x="536" y="118" width="48" height="48" rx="10" fill="#f59e0b"/>
  <!-- Pulse/crosshair icon -->
  <circle cx="560" cy="142" r="9" fill="#0b0e14"/>
  <line x1="560" y1="126" x2="560" y2="131" stroke="#0b0e14" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="560" y1="153" x2="560" y2="158" stroke="#0b0e14" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="544" y1="142" x2="549" y2="142" stroke="#0b0e14" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="571" y1="142" x2="576" y2="142" stroke="#0b0e14" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Brand name -->
  <text x="600" y="208" font-family="'Courier New', Courier, monospace" font-size="22" font-weight="700" fill="#f0ede8" text-anchor="middle" letter-spacing="-0.02em">CheckPulse</text>

  <!-- Eyebrow line -->
  <line x1="440" y1="230" x2="556" y2="230" stroke="#b97b08" stroke-width="1"/>
  <text x="600" y="235" font-family="'Courier New', Courier, monospace" font-size="11" fill="#f59e0b" text-anchor="middle" letter-spacing="0.18em">SHOPIFY CHECKOUT MONITOR</text>
  <line x1="644" y1="230" x2="760" y2="230" stroke="#b97b08" stroke-width="1"/>

  <!-- Main headline -->
  <text x="600" y="310" font-family="'Courier New', Courier, monospace" font-size="56" font-weight="700" fill="#f0ede8" text-anchor="middle" letter-spacing="-0.03em">Know before</text>
  <text x="600" y="375" font-family="'Courier New', Courier, monospace" font-size="56" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="-0.03em">your customers do.</text>

  <!-- Sub headline -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="20" fill="#8b8fa8" text-anchor="middle" font-weight="400">Simulates the full cart-to-payment flow hourly. Emails you the moment anything breaks.</text>

  <!-- Divider -->
  <line x1="480" y1="466" x2="720" y2="466" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="246" y="484" width="196" height="36" rx="18" fill="#141824" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="278" cy="502" r="5" fill="#22c55e"/>
  <text x="292" y="507" font-family="'Courier New', Courier, monospace" font-size="13" fill="#f0ede8" font-weight="700">4-step simulation</text>

  <!-- Pill 2 -->
  <rect x="462" y="484" width="276" height="36" rx="18" fill="#141824" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="494" cy="502" r="5" fill="#f59e0b"/>
  <text x="508" y="507" font-family="'Courier New', Courier, monospace" font-size="13" fill="#f0ede8" font-weight="700">Instant email alerts</text>

  <!-- Pill 3 -->
  <rect x="758" y="484" width="196" height="36" rx="18" fill="#141824" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="790" cy="502" r="5" fill="#8b8fa8"/>
  <text x="804" y="507" font-family="'Courier New', Courier, monospace" font-size="13" fill="#f0ede8" font-weight="700">No app install</text>

  <!-- URL at bottom -->
  <text x="600" y="580" font-family="'Courier New', Courier, monospace" font-size="14" fill="#4a4f65" text-anchor="middle" letter-spacing="0.05em">adadadada321321.github.io/checkpulse</text>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="3" fill="#f59e0b"/>
</svg>
