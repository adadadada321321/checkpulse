name = "checkpulse"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Lite mode: no D1/KV — stateless HTTP API only.
# Deploy in one command (no setup.sh needed):
#   CLOUDFLARE_API_TOKEN=xxx npx wrangler deploy -c wrangler.lite.toml
#
# Endpoints available in lite mode:
#   GET  /health                                     — health check
#   POST /check                { domain, email? }    — on-demand checkout check
#   POST /create-checkout-session { plan, email?, domain? } — Stripe checkout (needs secrets below)
#   POST /webhooks/stripe                            — Stripe subscription events
#
# Optional secrets (add via: wrangler secret put SECRET_NAME):
#   RESEND_API_KEY         — email alerts on failed checks
#   STRIPE_SECRET_KEY      — Stripe API key (sk_live_... or sk_test_...)
#   STRIPE_WEBHOOK_SECRET  — Stripe webhook signing secret (whsec_...)
#   STRIPE_PRICE_SOLO      — Stripe price ID for $39/mo plan (price_...)
#   STRIPE_PRICE_AGENCY    — Stripe price ID for $99/mo plan (price_...)
#
# Full monitoring (hourly cron + incident history) requires wrangler.toml + setup.sh.
