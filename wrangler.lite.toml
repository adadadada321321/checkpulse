name = "checkpulse"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Lite mode: no D1/KV — stateless HTTP API only.
# Deploy in one command (no setup.sh needed):
#   CLOUDFLARE_API_TOKEN=xxx npx wrangler deploy -c wrangler.lite.toml
#
# Endpoints available in lite mode:
#   POST /check   { domain, email? }  — run a checkout check, optionally email result
#   GET  /health                       — health check
#
# Full monitoring (hourly cron + incident tracking) requires wrangler.toml + setup.sh.
